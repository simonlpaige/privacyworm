name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mugshot]"

      - name: Run tests
        run: pytest --cov=privacyworm --cov-report=term-missing -v

      - name: Validate all playbooks
        run: python -c "from privacyworm.playbook import load_all_playbooks; pbs = load_all_playbooks(); print(f'{len(pbs)} playbooks validated OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mugshot]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy privacyworm/ --ignore-missing-imports

      - name: Bandit
        run: bandit -r privacyworm/ -ll

      - name: pip-audit
        run: pip-audit
