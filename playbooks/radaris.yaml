broker: radaris
display_name: Radaris
homepage: https://radaris.com
last_updated: "2026-04-22"
maintainer: "@community"

search:
  url_template: "https://radaris.com/p/{first}/{last}/"
  method: browser
  listing_selectors:
    - "div.card-block"
    - "div.person-card"
  match_fields:
    - first_name
    - last_name

opt_out:
  method: email
  email_address: "support@radaris.com"
  email_subject: "Data Removal Request"
  email_body_template: |
    To whom it may concern,

    I am requesting the removal of my personal information from Radaris.

    Name: $full_name
    Listing URL: $listing_url
    Contact email: $email

    Please remove this listing and confirm the removal at your earliest convenience.

    Thank you.
  requires_confirmation: false
  confirmation_type: none

rescan_days: 90
legal_basis:
  default: "Radaris email-based removal request"
  CA: "California Delete Act / CCPA Section 1798.105 deletion request"
  CO: "Colorado Privacy Act deletion request"
  CT: "Connecticut Data Privacy Act deletion request"
  TX: "Texas Data Privacy and Security Act / Data Broker Act deletion request"
  OR: "Oregon Consumer Privacy Act / data broker registry deletion request"
  VA: "Virginia Consumer Data Protection Act deletion request"
  MT: "Montana Consumer Data Privacy Act deletion request"
verification:
  verified_at: "2026-04-27"
  verified_by: "@simonlpaige"
  scan: fixture_only
  optout: dry_run_only
