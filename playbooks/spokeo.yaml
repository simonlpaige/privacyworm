broker: spokeo
display_name: Spokeo
homepage: https://www.spokeo.com
last_updated: "2026-04-22"
maintainer: "@community"

search:
  url_template: "https://www.spokeo.com/{first}-{last}/{state}"
  method: browser
  listing_selectors:
    - "article.person-result"
    - "div.result-item"
  match_fields:
    - first_name
    - last_name
    - state
    - city

extract:
  listing_url: "a.profile-link::attr(href)"
  full_name: "h2::text"
  city_state: "p.location::text"
  age: "p.age::text"

opt_out:
  method: web_form
  url: "https://www.spokeo.com/optout"
  form:
    email_field: "input[name='email']"
    url_field: "input[name='listing_url']"
    submit_button: "button[type='submit']"
  requires_confirmation: true
  confirmation_type: email_link
  confirmation_subject_contains: "Spokeo Opt Out"
  confirmation_link_text: "Confirm"
  confirmation_domains:
    - spokeo.com
  confirmation_path_contains:
    - /optout/confirm

tests:
  fixtures:
    - file: "tests/fixtures/spokeo_results.html"
      expected:
        listings: 2
        first_listing:
          full_name: "Simon L Paige"
          city_state: "Kansas City, MO"

rescan_days: 90
legal_basis: "CCPA if CA resident; otherwise Spokeo voluntary opt-out program"

verification:
  verified_at: "2026-04-27"
  verified_by: "@simonlpaige"
  scan: fixture_only
  optout: dry_run_only
