broker: justmugshots.com
display_name: Just Mugshots
homepage: https://justmugshots.com
last_updated: "2026-04-27"
maintainer: "@community"

search:
  url_template: "https://justmugshots.com/search/?q={first}+{last}"
  method: browser
  listing_selectors:
    - "div.search-result"
    - "article.entry"
  match_fields:
    - first_name
    - last_name
    - state
    - city

opt_out:
  method: manual
  manual_instructions: |
    Just Mugshots accepts removal requests only via a paid third-party
    service. We will not pay them. Instead:

      1. Generate a CCPA right-to-delete letter:
           privacyworm mugshot letters --site justmugshots.com
      2. Mail or email it to the contact on the site footer.
      3. If they pretend they cannot find your record, attach the
         listing URL captured during scan.
      4. Escalate to the California AG and the FTC if ignored.
  requires_confirmation: false
  confirmation_type: manual_ack

rescan_days: 60
legal_basis: "CCPA right-to-delete (Cal. Civ. Code 1798.105)"

verification:
  verified_at: "2026-04-27"
  verified_by: "@simonlpaige"
  scan: fixture_only
  optout: dry_run_only
