broker: peoplefinder
display_name: PeopleFinder
homepage: https://www.peoplefinder.com
last_updated: "2026-04-22"
maintainer: "@community"

search:
  url_template: "https://www.peoplefinder.com/results.php?fn={first}&ln={last}&state={state}"
  method: browser
  listing_selectors:
    - "div.result-row"
    - "li.people-result"
  match_fields:
    - first_name
    - last_name
    - state
    - city

opt_out:
  method: web_form
  url: "https://www.peoplefinder.com/optout.php"
  form:
    name_field: "input[name='name']"
    email_field: "input[name='email']"
    url_field: "input[name='record_url']"
    submit_button: "input[type='submit']"
  requires_confirmation: false
  confirmation_type: none

rescan_days: 90
legal_basis:
  default: "PeopleFinder voluntary opt-out request"
  CA: "California Delete Act / CCPA Section 1798.105 deletion request"
  CO: "Colorado Privacy Act deletion request"
  CT: "Connecticut Data Privacy Act deletion request"
  TX: "Texas Data Privacy and Security Act / Data Broker Act deletion request"
  OR: "Oregon Consumer Privacy Act / data broker registry deletion request"
  VA: "Virginia Consumer Data Protection Act deletion request"
  MT: "Montana Consumer Data Privacy Act deletion request"
verification:
  verified_at: "2026-04-27"
  verified_by: "@simonlpaige"
  scan: fixture_only
  optout: dry_run_only
