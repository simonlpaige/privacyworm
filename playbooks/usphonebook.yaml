broker: usphonebook
display_name: USPhoneBook
homepage: https://www.usphonebook.com
last_updated: "2026-04-22"
maintainer: "@community"

search:
  url_template: "https://www.usphonebook.com/{first}-{last}/{state}"
  method: browser
  listing_selectors:
    - "div.result-list-item"
    - "div.people-result"
  match_fields:
    - first_name
    - last_name
    - state

opt_out:
  method: web_form
  url: "https://www.usphonebook.com/opt-out"
  form:
    url_field: "input[name='listing_url']"
    name_field: "input[name='name']"
    submit_button: "button[type='submit']"
  requires_confirmation: false
  confirmation_type: none
  manual_instructions: >
    USPhoneBook typically processes removal within 48 hours.
    No confirmation email is sent.

rescan_days: 90
legal_basis:
  default: "USPhoneBook voluntary opt-out request"
  CA: "California Delete Act / CCPA Section 1798.105 deletion request"
  CO: "Colorado Privacy Act deletion request"
  CT: "Connecticut Data Privacy Act deletion request"
  TX: "Texas Data Privacy and Security Act / Data Broker Act deletion request"
  OR: "Oregon Consumer Privacy Act / data broker registry deletion request"
  VA: "Virginia Consumer Data Protection Act deletion request"
  MT: "Montana Consumer Data Privacy Act deletion request"
verification:
  verified_at: "2026-04-27"
  verified_by: "@simonlpaige"
  scan: fixture_only
  optout: dry_run_only
